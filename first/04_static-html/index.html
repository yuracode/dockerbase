<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My First Docker Page</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f4f8;
      color: #333;
      margin: 0;
      padding: 40px;
      line-height: 1.7;
    }
    .card {
      max-width: 640px;
      margin: 40px auto;
      background: white;
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    h1 {
      color: #0d6efd;
      font-size: 2rem;
    }
    code {
      background: #eef2f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐳 Hello Docker!</h1>
    <p>このページは <strong>Nginx コンテナ</strong> で配信されています。</p>
    <p>
      ホストのフォルダを <code>-v</code> オプションでコンテナにマウントしているので、<br>
      このファイルを編集 → 保存 → ブラウザをリロードで即反映されます。
    </p>
    <p>Docker ハンズオン 1回目</p>
  </div>
</body>
</html>
